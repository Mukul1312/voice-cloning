# VoxCPM2 LoRA fine-tune — GGS English voice clone, DENOISED-DATA TWIN of voxcpm_lora.yaml.
# IDENTICAL config to the original run on purpose: the ONLY variable changed is the training
# manifest (denoised clips) + the output paths. That keeps the denoised-vs-original comparison
# clean — pick the best checkpoint by UNSEEN ECAPA and compare to the 0.74 baseline.
pretrained_path: /workspace/VoxCPM2
train_manifest: /workspace/voice-cloning/data/out/lecture1/final/train_dn.voxcpm.jsonl
val_manifest:                      # empty -> skip validation (we evaluate by inference + ECAPA)

sample_rate: 16000                 # denoise_postproc.py already wrote clips_dn at 16k
out_sample_rate: 48000
batch_size: 2
grad_accum_steps: 8                # 2x8 = effective batch 16
num_workers: 2
num_iters: 500
log_interval: 10
valid_interval: 100
save_interval: 50                  # save often; pick best checkpoint by unseen ECAPA

learning_rate: 0.0001
weight_decay: 0.01
warmup_steps: 40
max_steps: 500
max_batch_tokens: 8192

save_path: /workspace/ckpt/lora_dn       # separate from the original run's /workspace/ckpt/lora
tensorboard: /workspace/logs/lora_dn

lambdas:
  loss/diff: 1.0
  loss/stop: 1.0

lora:
  enable_lm: true
  enable_dit: true
  enable_proj: false
  r: 32
  alpha: 32
  dropout: 0.0
